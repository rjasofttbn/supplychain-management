spring.application.name=supplyChainSystem
server.port=8080
spring.main.allow-bean-definition-overriding=true

# ==============================
# MySQL Database Config (Fixed for Docker)
# ==============================
# 1. Changed 'localhost' to 'db'
# 2. Changed 'supplyChainSystem' to 'supplychainsystem' (must match Compose exactly)
spring.datasource.url=jdbc:mysql://db:3306/supplychainsystem?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================
# Redis Config (Fixed for Docker)
# ==============================
# Using 'redis' as the fallback to match your Compose service name
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:redis}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.redis.timeout=2000

# IMPORTANT: Remove the old 'spring.redis.host=redis-server' line entirely!

# ==============================
# JPA / Hibernate Config
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==============================
# Email verification
# ==============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=omar.faruk@gigatechltd.com
spring.mail.password=Rjasoft@123
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.timeout=5000

# ==============================
# Logging & Monitoring
# ==============================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.prometheus.enabled=true